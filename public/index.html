<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#0a0a0c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Holy Grail</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('tp_theme');
          if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Passcode gate -->
    <div id="lock" class="lock hidden">
      <div class="lock-card">
        <img class="lock-mark" src="/icon-192.png?v=2" alt="" />
        <h1 id="lockTitle">Holy Grail</h1>
        <p>Enter the access code to continue</p>
        <form id="lockForm">
          <input id="passcode" type="password" inputmode="numeric" autocomplete="off" placeholder="Access code" aria-label="Access code" />
          <button type="submit">Enter</button>
        </form>
        <div id="lockError" class="lock-error"></div>
      </div>
    </div>

    <!-- Main app -->
    <div id="app" class="app hidden">
      <header class="topbar">
        <div class="brand">
          <img class="brand-mark" src="/icon-192.png?v=2" alt="Holy Grail" />
          <span id="appTitle" class="brand-title">Holy Grail</span>
        </div>
        <div class="search">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="currentColor" d="M10 4a6 6 0 1 0 3.86 10.6l4.77 4.77 1.41-1.41-4.77-4.77A6 6 0 0 0 10 4Zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z"/>
          </svg>
          <input id="searchInput" type="search" placeholder="Search talks or speakers" />
        </div>
        <button id="themeToggle" class="theme-btn" aria-label="Switch light or dark mode"></button>
      </header>

      <!-- Tab bar -->
      <nav id="tabs" class="tabs"></nav>

      <main id="scroll" class="scroll">
        <!-- Tab content (recently added, or a group's speakers) -->
        <section id="home" class="view">
          <div id="indexing" class="indexing hidden">
            <div class="spinner"></div>
            <p>Indexing your library from Google Drive…</p>
            <span id="indexingSub"></span>
          </div>
          <div id="homeContent"></div>
        </section>

        <!-- Search results -->
        <section id="searchView" class="view hidden">
          <div id="searchResults"></div>
        </section>

        <!-- Speaker detail -->
        <section id="speaker" class="view hidden">
          <button id="speakerBack" class="back-btn">
            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M15 18l-6-6 6-6"/></svg>
            <span id="backLabel">Back</span>
          </button>
          <div class="speaker-hero">
            <div id="speakerAvatar" class="speaker-avatar"></div>
            <div class="speaker-meta">
              <div id="speakerGroup" class="speaker-group"></div>
              <h1 id="speakerName"></h1>
              <div id="speakerCount" class="speaker-count"></div>
              <button id="playAll" class="play-all">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
                Play all
              </button>
            </div>
          </div>
          <div id="speakerTalks" class="talks"></div>
        </section>
      </main>

      <!-- Mini player -->
      <div id="mini" class="mini hidden" role="button" tabindex="0" aria-label="Open player">
        <div id="miniArt" class="mini-art"></div>
        <div class="mini-meta">
          <div id="miniTitle" class="mini-title">—</div>
          <div id="miniSpeaker" class="mini-speaker"></div>
        </div>
        <button id="miniPlay" class="icon-btn mini-play" aria-label="Play/Pause"></button>
        <div id="miniProgress" class="mini-progress"><span></span></div>
      </div>

      <!-- Now playing -->
      <section id="now" class="now hidden" aria-label="Now playing">
        <div id="nowBg" class="now-bg"></div>
        <div class="now-inner">
          <div class="grabber" id="grabber"></div>
          <button id="nowClose" class="now-close" aria-label="Close player">
            <svg viewBox="0 0 24 24" width="26" height="26"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
          </button>
          <div id="nowArt" class="now-art"></div>
          <div class="now-meta">
            <h2 id="nowTitle">—</h2>
            <p id="nowSpeaker"></p>
          </div>
          <div class="scrub">
            <input id="seek" type="range" min="0" max="1000" value="0" step="1" />
            <div class="times"><span id="cur">0:00</span><span id="dur">0:00</span></div>
          </div>
          <div class="controls">
            <button id="prevBtn" class="icon-btn nav" aria-label="Previous">
              <svg viewBox="0 0 24 24" width="26" height="26"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button id="back15" class="icon-btn skip" aria-label="Back 15 seconds"><span class="skip-num">15</span></button>
            <button id="playBtn" class="play-big" aria-label="Play/Pause"></button>
            <button id="fwd30" class="icon-btn skip" aria-label="Forward 30 seconds"><span class="skip-num">30</span></button>
            <button id="nextBtn" class="icon-btn nav" aria-label="Next">
              <svg viewBox="0 0 24 24" width="26" height="26"><path fill="currentColor" d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
            </button>
          </div>
          <div class="extra">
            <button id="favBtn" class="pill pill-ic" aria-label="Favorite"></button>
            <button id="clarityBtn" class="pill pill-ic" aria-label="Clarity: reduce tape hiss and sharpen voice"></button>
            <button id="speedBtn" class="pill">1×</button>
            <button id="sleepBtn" class="pill pill-ic" aria-label="Sleep timer"></button>
          </div>
          <div id="sleepMenu" class="sleep-menu hidden">
            <div class="sleep-title">Sleep timer</div>
            <div class="sleep-opt" data-min="15">15 minutes</div>
            <div class="sleep-opt" data-min="30">30 minutes</div>
            <div class="sleep-opt" data-min="45">45 minutes</div>
            <div class="sleep-opt" data-min="60">1 hour</div>
            <div class="sleep-opt" data-min="end">End of talk</div>
            <div class="sleep-opt sleep-off" data-min="0">Off</div>
          </div>
        </div>

        <!-- Up next chooser (shown when a full talk ends) -->
        <div id="upnext" class="upnext hidden">
          <div class="upnext-head">Up next</div>
          <div class="upnext-cards">
            <button class="un-card" id="un0">
              <div class="un-art"></div>
              <div class="un-info"><div class="un-title"></div><div class="un-sub"></div></div>
              <span class="un-badge">Autoplay</span>
            </button>
            <button class="un-card" id="un1">
              <div class="un-art"></div>
              <div class="un-info"><div class="un-title"></div><div class="un-sub"></div></div>
            </button>
          </div>
          <div class="upnext-bar"><span id="upnextBar"></span></div>
          <div class="upnext-foot">
            <span id="upnextCount"></span>
            <button id="upnextCancel" class="pill">Cancel</button>
          </div>
        </div>
      </section>
    </div>

    <audio id="audio" preload="metadata"></audio>
    <script src="/app.js"></script>
  </body>
</html>
