<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF7D2"/>
      <stop offset="0.32" stop-color="#FFD658"/>
      <stop offset="0.66" stop-color="#DA9A1C"/>
      <stop offset="1" stop-color="#976409"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EEB43A"/>
      <stop offset="1" stop-color="#7A5108"/>
    </linearGradient>
    <linearGradient id="goldRim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A9760D"/>
      <stop offset="0.5" stop-color="#FFEDAE"/>
      <stop offset="1" stop-color="#A9760D"/>
    </linearGradient>
    <radialGradient id="sapphire" cx="0.36" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#D3E2FF"/>
      <stop offset="0.45" stop-color="#356BE6"/>
      <stop offset="1" stop-color="#0A2A82"/>
    </radialGradient>
    <radialGradient id="emerald" cx="0.36" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#CFFFE2"/>
      <stop offset="0.45" stop-color="#1EBC69"/>
      <stop offset="1" stop-color="#0A6236"/>
    </radialGradient>
    <radialGradient id="ruby" cx="0.36" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#FFCDD8"/>
      <stop offset="0.45" stop-color="#F02A57"/>
      <stop offset="1" stop-color="#8E0A2E"/>
    </radialGradient>
    <radialGradient id="diamond" cx="0.36" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#E4EEFF"/>
      <stop offset="1" stop-color="#A9C7F2"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <g id="spark">
      <path d="M0,-15 L3.4,-3.4 L15,0 L3.4,3.4 L0,15 L-3.4,3.4 L-15,0 L-3.4,-3.4 Z" fill="#ffffff"/>
    </g>
  </defs>

  <g filter="url(#soft)" transform="translate(0,-6)">

    <!-- ===== Base / foot / stem / knop ===== -->
    <ellipse cx="256" cy="446" rx="92" ry="18" fill="url(#goldDark)"/>
    <ellipse cx="256" cy="442" rx="88" ry="15" fill="url(#gold)"/>
    <ellipse cx="248" cy="438" rx="52" ry="7" fill="#ffffff" opacity="0.35"/>
    <path d="M214,404 Q256,394 298,404 L322,436 Q256,448 190,436 Z" fill="url(#gold)"/>
    <path d="M214,404 Q256,396 298,404 L292,410 Q256,402 220,410 Z" fill="#ffffff" opacity="0.35"/>
    <path d="M244,352 L240,406 L272,406 L268,352 Z" fill="url(#gold)"/>
    <rect x="248" y="352" width="6" height="54" fill="#ffffff" opacity="0.35"/>
    <circle cx="256" cy="350" r="24" fill="url(#gold)"/>
    <circle cx="256" cy="350" r="24" fill="none" stroke="#8a5c08" stroke-width="2" opacity="0.5"/>
    <circle cx="248" cy="342" r="7" fill="#ffffff" opacity="0.55"/>
    <circle cx="256" cy="350" r="8" fill="url(#ruby)"/>

    <!-- ===== Cup bowl ===== -->
    <path d="M144,206 C152,276 210,326 256,326 C302,326 360,276 368,206 Z" fill="url(#gold)"/>
    <!-- bowl left sheen -->
    <path d="M158,210 C166,268 196,308 224,320 C196,300 178,258 172,210 Z" fill="#ffffff" opacity="0.30"/>
    <!-- jewelled band around bowl -->
    <g>
      <circle cx="178" cy="236" r="9" fill="url(#emerald)"/>
      <circle cx="212" cy="256" r="10" fill="url(#ruby)"/>
      <circle cx="256" cy="264" r="11" fill="url(#sapphire)"/>
      <circle cx="300" cy="256" r="10" fill="url(#diamond)"/>
      <circle cx="334" cy="236" r="9" fill="url(#emerald)"/>
    </g>
    <path d="M150,214 C158,236 200,250 256,250 C312,250 354,236 362,214" fill="none" stroke="#8a5c08" stroke-width="2.5" opacity="0.4"/>

    <!-- ===== Rim (gold torus + dark interior) ===== -->
    <ellipse cx="256" cy="206" rx="114" ry="31" fill="url(#goldRim)"/>
    <ellipse cx="256" cy="205" rx="97" ry="22" fill="#3a2907"/>

    <!-- ===== Gem mound (back rows first, front last) ===== -->
    <!-- top row (near crown) -->
    <g>
      <circle cx="242" cy="156" r="15" fill="url(#diamond)"/>
      <circle cx="274" cy="153" r="15" fill="url(#emerald)"/>
    </g>
    <!-- upper -->
    <g>
      <circle cx="220" cy="172" r="16" fill="url(#emerald)"/>
      <circle cx="258" cy="175" r="18" fill="url(#sapphire)"/>
      <circle cx="294" cy="171" r="16" fill="url(#ruby)"/>
    </g>
    <!-- mid -->
    <g>
      <circle cx="199" cy="195" r="17" fill="url(#sapphire)"/>
      <circle cx="236" cy="199" r="18" fill="url(#ruby)"/>
      <circle cx="275" cy="200" r="18" fill="url(#diamond)"/>
      <circle cx="312" cy="194" r="17" fill="url(#emerald)"/>
    </g>
    <!-- front overflow row (spilling over the rim) -->
    <g>
      <circle cx="184" cy="214" r="15" fill="url(#ruby)"/>
      <circle cx="218" cy="221" r="16" fill="url(#diamond)"/>
      <circle cx="256" cy="224" r="17" fill="url(#emerald)"/>
      <circle cx="296" cy="220" r="16" fill="url(#sapphire)"/>
      <circle cx="330" cy="213" r="15" fill="url(#ruby)"/>
    </g>
    <!-- gem highlights -->
    <g fill="#ffffff" opacity="0.75">
      <circle cx="253" cy="170" r="4"/><circle cx="231" cy="194" r="4"/>
      <circle cx="270" cy="195" r="4.5"/><circle cx="307" cy="189" r="3.5"/>
      <circle cx="213" cy="216" r="4"/><circle cx="251" cy="219" r="4.5"/>
      <circle cx="291" cy="215" r="4"/><circle cx="215" cy="167" r="3.5"/>
      <circle cx="238" cy="151" r="3.5"/>
    </g>

    <!-- ===== Crown ===== -->
    <path d="M204,150 L214,110 L235,136 L256,100 L277,136 L298,110 L308,150 Z" fill="url(#gold)"/>
    <path d="M204,150 L214,110 L224,124 L214,150 Z" fill="#ffffff" opacity="0.30"/>
    <rect x="199" y="146" width="114" height="17" rx="6" fill="url(#goldRim)"/>
    <g>
      <circle cx="228" cy="155" r="5.5" fill="url(#sapphire)"/>
      <circle cx="256" cy="155" r="6.5" fill="url(#ruby)"/>
      <circle cx="284" cy="155" r="5.5" fill="url(#emerald)"/>
    </g>
    <g fill="url(#gold)" stroke="#8a5c08" stroke-width="1.5">
      <circle cx="214" cy="108" r="7"/>
      <circle cx="256" cy="98" r="8"/>
      <circle cx="298" cy="108" r="7"/>
    </g>
    <circle cx="256" cy="96" r="3" fill="#ffffff" opacity="0.7"/>

    <!-- ===== Sparkles ===== -->
    <use href="#spark" transform="translate(150,196) scale(0.7)" opacity="0.9"/>
    <use href="#spark" transform="translate(360,206) scale(0.55)" opacity="0.85"/>
    <use href="#spark" transform="translate(300,120) scale(0.5)" opacity="0.8"/>
    <use href="#spark" transform="translate(196,430) scale(0.4)" opacity="0.7"/>
    <use href="#spark" transform="translate(256,232) scale(0.42)" opacity="0.75"/>
  </g>
</svg>
