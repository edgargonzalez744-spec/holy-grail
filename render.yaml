services:
  - type: web
    name: holy-grail
    runtime: node
    plan: free             # $0; sleeps when idle. Switch to "starter" ($7/mo) for always-on.
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/config
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_TITLE
        value: Holy Grail
      - key: SESSION_SECRET
        generateValue: true   # Render generates a random secret
      # --- set these three in the Render dashboard (marked secret) ---
      - key: DRIVE_FOLDER_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: APP_PASSCODE
        sync: false
