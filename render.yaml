services:
  - type: web
    name: talks-player
    runtime: node
    plan: starter          # always-on; use "free" to test (sleeps when idle)
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/config
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_TITLE
        value: Talks
      - key: SESSION_SECRET
        generateValue: true   # Render generates a random secret
      # --- set these three in the Render dashboard (marked secret) ---
      - key: DRIVE_FOLDER_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: APP_PASSCODE
        sync: false
